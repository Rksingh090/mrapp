<style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap');

    .photo-viewport {
        min-height: 100vh;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: #fffcf3;
        font-family: 'Outfit', sans-serif;
    }

    .form-card {
        background: white;
        border-radius: 30px;
        padding: 50px 40px;
        width: 100%;
        max-width: 480px;
        box-shadow: 0 30px 60px rgba(236, 172, 40, 0.1);
        text-align: center;
        border: 1px solid #ffeeba;
    }

    .rakhi-graphic {
        font-size: 80px;
        margin-bottom: 20px;
        color: #ecac28;
    }

    .festive-title {
        font-size: 28px;
        color: #b7791f;
        font-weight: 800;
        margin-bottom: 10px;
    }

    .festive-subtitle {
        color: #a0aec0;
        margin-bottom: 30px;
    }

    /* File Input Styling */
    .mrapp-input-photo-container {
        border: 2px dashed #ecac28 !important;
        background: #fffcf0 !important;
        border-radius: 20px !important;
        padding: 40px !important;
    }

    .mrapp-input-photo-label {
        font-weight: 800;
        color: #b7791f;
    }

    .mrapp-button-submit {
        width: 100%;
        padding: 20px;
        border-radius: 15px;
        border: none;
        background: #ecac28 !important;
        color: white;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 2px;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 10px 20px rgba(236, 172, 40, 0.3) !important;
        margin-top: 20px;
    }
</style>

<div class="photo-viewport">
    <div class="form-card">
        <div class="rakhi-graphic">❂</div>
        <h1 class="festive-title">Upload Photo</h1>
        <p class="festive-subtitle">Share a beautiful memory to include on the card.</p>

        <div class="inputs">
            {{field:photo}}
        </div>


        <button type="submit"
            style="margin-top:20px; background:none; border:none; color:#a0aec0; cursor:pointer; font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:1px;">Go
            Back</button>
    </div>
</div>
